<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>PTO Calendar</title>
    <link href="styles/styles.css" rel="stylesheet" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
</head>

<body>
    <div id="auth-overlay">
        <div id="auth-box">
            <h2>Welcome to PTO Calendar</h2>
            <p>Sign in to save your data across devices, or continue as a guest.</p>
            <button id="google-signin-btn">Sign in with Google</button>
            <button id="anonymous-signin-btn">Continue without signing in (data won't be saved)</button>
        </div>
    </div>

    <div id="user-bar">
        <span id="user-label"></span>
        <button id="link-account-btn" style="display:none">Link Google Account</button>
        <button id="signout-btn">Sign Out</button>
        <span id="auth-error" style="display:none; color:red;"></span>
    </div>

    <div id="main-content" style="display:none">
        <h1>PTO Calendar</h1>

        <div id="settings">
            <label>Hours per workday: <input type="number" id="hours-per-day" min="1" max="24" value="8" /></label>
            <button id="toggle-view">Switch to Hours View</button>

            <div>
                <span>Total PTO:</span>
                <label><input type="number" id="pto-hours" min="0" value="0" /> hours</label>
                <label><input type="number" id="pto-days" min="0" value="0" /> days</label>
            </div>

            <div>
                <span>Total Sick Time:</span>
                <label><input type="number" id="sick-hours" min="0" value="0" /> hours</label>
                <label><input type="number" id="sick-days" min="0" value="0" /> days</label>
            </div>
        </div>

        <div class="header">
            <button id="prev">‹</button>
            <span id="year-label"></span>
            <button id="next">›</button>
        </div>
        <div class="calendar" id="calendar"></div>
        <div id="summary">
            <p>PTO Used:
                <span id="pto-summary-hours"><span id="pto-used-hours">0</span> / <span id="pto-avail-hours">0</span>
                    hrs (<span id="pto-remaining-hours">0</span> hrs remaining) </span>
                <span id="pto-summary-days"><span id="pto-used-days">0</span> / <span id="pto-avail-days">0</span>
                    days (<span id="pto-remaining-days">0</span> days remaining)</span>
            </p>
            <p>Sick Used:
                <span id="sick-summary-hours"><span id="sick-used-hours">0</span> / <span id="sick-avail-hours">0</span>
                    hrs (<span id="sick-remaining-hours">0</span> hrs remaining)</span>
                <span id="sick-summary-days"><span id="sick-used-days">0</span> / <span id="sick-avail-days">0</span>
                    days (<span id="sick-remaining-days">0</span> days remaining)</span>
            </p>
        </div>
        <div id="data-controls">
            <button id="export-btn">Save to JSON file</button>
            <label>Load JSON file: <input type="file" id="import-input" accept=".json" /></label>
            <button id="clear-btn">Clear All Data</button>
        </div>
    </div>
    <script type="module" src="scripts/calendar.js"></script>
</body>

</html>
